<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapChat</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: #0a0a0a;
    color: white;
}

.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -3;
    background: #0a0a0a;
}


.bg::before,
.bg::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    animation: moveLight 3s infinite alternate ease-in-out;
}

.bg::before {
    background: #2563eb;
    top: 10%;
    left: 10%;
}

.bg::after {
    background: #1e3a8a;
    bottom: 10%;
    right: 10%;
    animation-delay: 3s;
}

@keyframes moveLight {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(100px, -80px) scale(1.2); }
}


#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
    top: 0;
    left: 0;
    filter: blur(1px);
}


.lang {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
}

.lang button {
    margin-left: 5px;
    padding: 6px 12px;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    cursor: pointer;
}


.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}

.logo {
    width: 250px;
    animation: logoIn 1.2s ease;
}

@keyframes logoIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
}

h1 {
    font-size: 42px;
    margin-top: 16px;
}

.subtitle {
    opacity: 0.7;
    margin-top: 8px;
}


.section {
    padding: 80px 20px;
    max-width: 900px;
    margin: auto;
}

.section h2 {
    margin-bottom: 20px;
}


.glass {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 20px rgba(37,99,235,0.15);
}


.cards {
    display: grid;
    gap: 16px;
    margin-top: 20px;
}


.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}


.footer {
    text-align: center;
    padding: 30px;
    opacity: 0.5;
}


@media (max-width: 600px) {
    h1 { font-size: 32px; }
}


@media (min-width: 768px) {
    .cards {
        grid-template-columns: repeat(2, 1fr);
    }
}


.button {
    margin-top: 24px;
    padding: 14px 32px;
    border-radius: 40px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    text-decoration: none;
    color: white;
    font-weight: bold;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    min-width: 200px;
    transition: 0.3s;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.button:hover {
    transform: scale(1.05);
}

.version {
    font-size: 14px;
    opacity: 0.6;
    margin-top: 4px;
}
@media (max-width: 768px) {
    #particles {
        display: none;
    }
}
</style>
</head>

<body>

<div class="bg"></div>
<canvas id="particles"></canvas>

<div class="lang">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
</div>

<div class="hero">
    <img src="logo.png" class="logo">
    <h1>TapChat</h1>
    <p id="subtitle" class="subtitle"></p>
</div>

<!-- Что такое TapChat? -->
<div class="section fade" id="about">
    <h2 id="aboutTitle"></h2>
    <div class="glass" style="padding:24px; text-align:left; line-height:1.6;">
        <p id="aboutDesc"></p>
    </div>
</div>

<!-- Почему TapChat? -->
<div class="section fade">
    <h2 id="why"></h2>
    <div class="cards">
        <div class="glass"><h3 data-key="sec1"></h3></div>
        <div class="glass"><h3 data-key="sec2"></h3></div>
        <div class="glass"><h3 data-key="sec3"></h3></div>
        <div class="glass"><h3 data-key="sec4"></h3></div>
    </div>
</div>

<!-- Скачать -->
<div class="section fade" id="download">
    <h2 id="downloadTitle"></h2>
    <p id="downloadSub" style="opacity:0.7;"></p>
    <div id="versionDisplay" class="version"></div>
    <a href="#" class="button" id="downloadBtn"></a>
</div>

<div class="footer">© 2026 TapChat</div>

<script>

const translations = {
    ru: {
        subtitle: "Проще, чем кажется.",
        aboutTitle: "Что такое TapChat?",
        aboutDesc: "TapChat — мессенджер для локальных сетей. Общайтесь с теми, кто рядом — без интернета. Отправляйте сообщения, фото и видео, настраивайте профиль и пользуйтесь тёмной темой. Всё просто: добавьте собеседника по IP-адресу и начинайте общение.",
        why: "Почему TapChat?",
        sec1: "Полная безопасность",
        sec2: "Децентрализация",
        sec3: "Высокая скорость",
        sec4: "Простота",
        downloadTitle: "Скачать",
        downloadSub: "Доступно на Android",
        downloadBtn: "Скачать APK",
        version: "Версия "
    },
    en: {
        subtitle: "Easier than it sounds.",
        aboutTitle: "What is TapChat?",
        aboutDesc: "TapChat is a local network messenger. Chat with people nearby — no internet needed. Send messages, photos and videos, customize your profile and enjoy dark theme. Just add a contact by IP address and start chatting.",
        why: "Why TapChat?",
        sec1: "Full security",
        sec2: "Decentralization",
        sec3: "High speed",
        sec4: "Simplicity",
        downloadTitle: "Download",
        downloadSub: "Available on Android",
        downloadBtn: "Download APK",
        version: "Version "
    }
};

function setLang(lang) {
    const t = translations[lang];
    document.getElementById("subtitle").innerText = t.subtitle;
    document.getElementById("aboutTitle").innerText = t.aboutTitle;
    document.getElementById("aboutDesc").innerText = t.aboutDesc;
    document.getElementById("why").innerText = t.why;
    document.getElementById("downloadTitle").innerText = t.downloadTitle;
    document.getElementById("downloadSub").innerText = t.downloadSub;
    document.getElementById("downloadBtn").innerText = t.downloadBtn;
    const versionEl = document.getElementById('versionDisplay');
    const versionNumber = versionEl.dataset.version || '';
    versionEl.textContent = t.version + versionNumber;

    document.querySelectorAll("[data-key]").forEach(el => {
        el.innerText = t[el.dataset.key];
    });
}

setLang('ru');


const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add("show");
    });
});
document.querySelectorAll(".fade").forEach(el => observer.observe(el));

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];
let mouse = { x: null, y: null };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

window.addEventListener("mousemove", (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});

function createParticles() {
    particles = [];
    for (let i = 0; i < 70; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4
        });
    }
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const ATTRACTION_RADIUS = 150;
    const ATTRACTION_STRENGTH = 0.02;
    const MAX_SPEED = 1.5;

    if (mouse.x !== null && mouse.y !== null) {
        particles.forEach(p => {
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < ATTRACTION_RADIUS && dist > 0.5) {
                const dirX = dx / dist;
                const dirY = dy / dist;
                const force = (1 - dist / ATTRACTION_RADIUS) * ATTRACTION_STRENGTH;
                p.vx += dirX * force;
                p.vy += dirY * force;
                p.vx *= 0.98;
                p.vy *= 0.98;
                const spd = Math.hypot(p.vx, p.vy);
                if (spd > MAX_SPEED) {
                    p.vx = (p.vx / spd) * MAX_SPEED;
                    p.vy = (p.vy / spd) * MAX_SPEED;
                }
            }
        });
    }

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
        if (p.y > canvas.height) p.y = 0;
        if (p.y < 0) p.y = canvas.height;
    });

    particles.forEach(p => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(255,255,255,0.8)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    for (let a = 0; a < particles.length; a++) {
        for (let b = a + 1; b < particles.length; b++) {
            let dx = particles[a].x - particles[b].x;
            let dy = particles[a].y - particles[b].y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
                ctx.strokeStyle = "rgba(255,255,255," + (1 - dist/120) * 0.4 + ")";
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.stroke();
            }
        }
    }

    if (mouse.x !== null && mouse.y !== null) {
        particles.forEach(p => {
            let dx = p.x - mouse.x;
            let dy = p.y - mouse.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
                const opacity = (1 - dist / 150) * 0.6;
                ctx.strokeStyle = `rgba(37, 99, 235, ${opacity})`;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
            }
        });
    }

    requestAnimationFrame(drawParticles);
}

createParticles();
drawParticles();

fetch('version.json?_=' + Date.now())
    .then(res => {
        if (!res.ok) throw new Error('HTTP error ' + res.status);
        return res.json();
    })
    .then(data => {
        const versionEl = document.getElementById('versionDisplay');
        if (data.version) {
            versionEl.dataset.version = data.version; // сохраняем номер
            const lang = document.documentElement.lang || 'ru';
            const prefix = translations[lang]?.version || 'Версия ';
            versionEl.textContent = prefix + data.version;
        }
        const downloadBtn = document.getElementById('downloadBtn');
        if (data.url) {
            downloadBtn.href = data.url;
        }
    })
    .catch(() => {
        console.warn('version.json not loaded');
    });
document.getElementById('downloadBtn').addEventListener('click', function(e) {
    e.preventDefault();
    const url = this.href;
    if (url && url !== '#') {
        const link = document.createElement('a');
        link.href = url;
        link.download = url.split('/').pop() || 'TapChat.apk';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
});</script>

</body>
</html>
